<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>zenlist</title>
    <script type="module" src="/src/main.js"></script>
    <link rel="stylesheet" href="/styles/main.css" />
  </head>
  <body>
    <div id="app" class="shell" aria-label="zenlist">
      <main class="memo-card">
        <header class="memo-header" data-drag-region>
          <div class="title-block">
            <h1 class="memo-title">zenlist</h1>
            <p class="memo-date" data-date>Loading...</p>
          </div>
          <div class="header-actions">
            <button class="icon-button pin-button" type="button" data-pin-button aria-label="Pin window" aria-pressed="false" title="Pin window">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M14.8 3.5c.6 0 .9.8.5 1.3l-.9 1.2 4.1 4.1c.3.3.3.8 0 1.1l-.7.7c-.2.2-.4.2-.6.2h-2.8l-3.1 3.1V20c0 .4-.2.7-.6.8a.8.8 0 0 1-.9-.2L8.5 17l-2.3 2.3a.8.8 0 0 1-1.1-1.1L7.4 16 4 12.6a.8.8 0 0 1-.2-.9c.1-.4.4-.6.8-.6h4.8l3.1-3.1V5.2c0-.2.1-.4.2-.6l1.2-.9c.1-.1.2-.2.4-.2Z" />
              </svg>
            </button>
            <button class="icon-button resize-button" type="button" data-resize-button aria-label="Shrink window" aria-pressed="false" title="Shrink window">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9.53 8.47a.75.75 0 0 1-1.06 0L6 6v2.25a.75.75 0 0 1-1.5 0V4.5a.75.75 0 0 1 .75-.75H9a.75.75 0 0 1 0 1.5H6.81l2.72 2.72a.75.75 0 0 1 0 1.06Zm4.94 7.06a.75.75 0 0 1 1.06 0L18 18v-2.25a.75.75 0 0 1 1.5 0v3.75a.75.75 0 0 1-.75.75H15a.75.75 0 0 1 0-1.5h2.19l-2.72-2.72a.75.75 0 0 1 0-1.06Zm1.06-7.06a.75.75 0 0 1 0-1.06l2.72-2.72H15a.75.75 0 0 1 0-1.5h3.75a.75.75 0 0 1 .75.75v3.75a.75.75 0 0 1-1.5 0V6l-2.47 2.47a.75.75 0 0 1-1.06 0Zm-7.06 7.06a.75.75 0 0 1 0 1.06L6 18.99h2.25a.75.75 0 0 1 0 1.5H4.5a.75.75 0 0 1-.75-.75V15a.75.75 0 0 1 1.5 0v2.19l2.22-2.22a.75.75 0 0 1 1.06 0Z" />
              </svg>
            </button>
            <button class="icon-button theme-button" type="button" data-theme-button aria-label="Enable dark mode" aria-pressed="false" title="Enable dark mode">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M12.97 3.5a.75.75 0 0 1 .95.86 6.5 6.5 0 1 0 5.72 10.1.75.75 0 0 1 1.36.58 8 8 0 1 1-8.03-11.54Z" />
                <path d="M18.5 3.5c.14 0 .26.08.31.21l.54 1.29 1.29.54a.34.34 0 0 1 0 .62l-1.29.54-.54 1.29a.34.34 0 0 1-.62 0l-.54-1.29-1.29-.54a.34.34 0 0 1 0-.62l1.29-.54.54-1.29a.34.34 0 0 1 .31-.21Z" />
              </svg>
            </button>
            <button class="icon-button clear-button" type="button" data-clear-button aria-label="Clear memo" title="Clear memo">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 3.75A1.75 1.75 0 0 1 10.75 2h2.5A1.75 1.75 0 0 1 15 3.75V5h3.25a.75.75 0 0 1 0 1.5h-.83l-.77 11.1A2.75 2.75 0 0 1 13.9 20H10.1a2.75 2.75 0 0 1-2.75-2.4L6.58 6.5h-.83a.75.75 0 0 1 0-1.5H9V3.75Zm1.5 1.25v.25h2.5V5h-2.5Zm-2.5 2.75.72 10.34c.04.59.53 1.06 1.12 1.06h3.98c.59 0 1.08-.47 1.12-1.06L15.66 7.5H8Z" />
              </svg>
            </button>
          </div>
        </header>

        <section class="task-list" aria-label="Tasks" data-task-list></section>

        <footer class="progress-card" aria-label="Progress">
          <div class="progress-meta">
            <span data-progress-count>0 of 6</span>
            <span data-progress-percent>0%</span>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" data-progress-fill></div>
          </div>
        </footer>

        <div class="task-detail-backdrop" data-task-detail-backdrop hidden>
          <section class="task-detail-modal" data-task-detail-modal role="dialog" aria-modal="true" aria-labelledby="task-detail-title">
            <div class="task-detail-header">
              <h2 class="task-detail-title" id="task-detail-title" data-task-detail-title>Task details</h2>
              <button class="task-detail-close" type="button" data-task-detail-close>Done</button>
            </div>
            <textarea
              class="task-detail-input"
              data-task-detail-input
              rows="3"
              placeholder="Add details for this task..."
              aria-label="Task details"
            ></textarea>
          </section>
        </div>
      </main>
    </div>
  </body>
</html>
